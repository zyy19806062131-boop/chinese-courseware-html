<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chinese Courseware</title>
  <style>
    :root{--bg:#f7f1e8;--paper:#fffaf2;--ink:#24211f;--muted:#7c7168;--line:rgba(52,40,32,.14);--accent:#b88a4e;}
    *{box-sizing:border-box}
    body{margin:0;min-height:100vh;background:radial-gradient(circle at 12% 20%,#fff,transparent 28%),radial-gradient(circle at 86% 14%,rgba(184,138,78,.22),transparent 24%),var(--bg);color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;display:grid;place-items:center;padding:32px;}
    main{width:min(920px,100%);}
    .hero{margin-bottom:28px;}
    .kicker{font-size:12px;letter-spacing:.14em;text-transform:uppercase;font-weight:800;color:var(--accent);margin-bottom:12px;}
    h1{font-size:clamp(36px,7vw,72px);margin:0;letter-spacing:-.055em;line-height:1.02;}
    p{color:var(--muted);line-height:1.8;font-size:16px;max-width:620px;margin:16px 0 0;}
    .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:18px;margin-top:32px;}
    .card{display:block;padding:26px;border-radius:30px;background:rgba(255,250,242,.72);border:1px solid rgba(255,255,255,.65);box-shadow:0 24px 70px rgba(76,57,38,.13);text-decoration:none;color:inherit;transition:.25s ease;}
    .card:hover{transform:translateY(-4px);box-shadow:0 30px 90px rgba(76,57,38,.17);}
    .card b{display:block;font-size:24px;letter-spacing:-.035em;margin-bottom:8px;}
    .card span{display:block;color:var(--muted);line-height:1.65;font-size:14px;}
    .tag{display:inline-flex;margin-bottom:18px;padding:8px 12px;border-radius:999px;background:rgba(184,138,78,.12);color:var(--accent);font-weight:800;font-size:12px;}
  </style>
</head>
<body>
  <main>
    <section class="hero">
      <div class="kicker">Chinese Courseware HTML</div>
      <h1>中文互动课件库</h1>
      <p>这里保存可以直接在线打开的中文课件。点击下面的课程卡片进入学生端页面。</p>
    </section>
    <section class="grid">
      <a class="card" href="lessons/tamila.html">
        <span class="tag">HSK3–4 Speaking</span>
        <b>TAMILA · Speaking Lounge</b>
        <span>7 Topics Speaking Lounge · 口语主题训练课件。</span>
      </a>
    </section>
  </main>
</body>
</html>
